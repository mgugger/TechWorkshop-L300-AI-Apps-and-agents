name: Deploy Interior Design Agent

on:
  push:
    paths:
      - 'src/app/agents/interiorDesignAgent_initializer.py'
      - 'src/prompts/InteriorDesignAgentPrompt.txt'
      - 'src/app/tools/aiSearchTools.py'
      - 'src/app/tools/imageCreationTool.py'
      - '.github/workflows/interior_design_agent_deployment.yml'
  workflow_dispatch:

jobs:
  run-interior-design-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file from secret
        run: 'echo "$ENV" > src/.env'
        shell: bash
        env:
          ENV: ${{ secrets.ENV }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run Interior Design agent initializer
        run: |
          cd src
          python app/agents/interiorDesignAgent_initializer.py
